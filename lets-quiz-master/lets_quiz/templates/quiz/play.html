{% extends 'base.html' %}

{% block content %}
{% if question is None %}

<div class="container">
  <div class="bg-light p-5 rounded my-4">
    <h1>You have already answered all of our questions.</h1>
    <a href="{% url 'quiz:leaderboard' %}" class="btn btn-lg btn-info mt-3"><i class="fas fa-trophy"></i> See the leaderboard here <i class="fas fa-trophy"></i></a>
  </div>
</div>

{% else %}

<div class="container">
  <div class="bg-light p-5 rounded my-4">

    <h3 class="text-info mb-4">{{ question.html|safe }}</h3>
    <form class="form" action="" method="post">
        {% csrf_token %}
        <input type="hidden" name="question_pk" value="{{ question.pk }}">
        {% for choice in question.choices.all %}
          <div class="form-check mx-4 my-3">
            <input class="form-check-input" type="radio" name="choice_pk" id="choice-{{ forloop.counter }}" value="{{ choice.pk }}">
            <label class="form-check-label" for="choice-{{ forloop.counter }}">
              {{ choice.html|safe }}
            </label>
          </div>
        {% endfor %}
        <input class="btn btn-info btn-lg mt-3" type="submit" value="Submit">  
    </form>
  </div>
</div>
{% endif %}

{% endblock content %}
